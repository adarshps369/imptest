name: Deploy Static Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # 👇 REQUIRED for environment secrets
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 👇 Generate a consistent release name
      - name: Set Release Name
        run: echo "RELEASE=$(date +%s)" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create Release Directory
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "mkdir -p ${{ secrets.DEPLOY_PATH }}/releases/${{ env.RELEASE }}"

      - name: Upload Files (rsync)
        run: |
          rsync -avz --delete \
          ./ \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/releases/${{ env.RELEASE }}

      - name: Update Symlink & Reload Nginx
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          set -e
          cd ${{ secrets.DEPLOY_PATH }}

          # Point current to new release
          ln -sfn releases/${{ env.RELEASE }} current

          # Reload nginx
          sudo systemctl reload nginx
          EOF
